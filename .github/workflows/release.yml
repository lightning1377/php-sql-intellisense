name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag
        run: npm run check-release-tag -- "$GITHUB_REF_NAME"

      - name: Lint
        run: npm run lint

      - name: Package VSIX
        run: npm run vsce

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" releases/*.vsix --title "$GITHUB_REF_NAME" --generate-notes --verify-tag
